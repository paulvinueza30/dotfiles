if.app-id = 'com.apple.AppStore'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "App Store"']

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Calendar"']

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Reminders"']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Messages"']

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "FaceTime"']

[[on-window-detected]]
if.app-id = 'com.apple.AddressBook'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Contacts"']

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Notes"']

[[on-window-detected]]
if.app-id = 'com.apple.Home'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Home"']

[[on-window-detected]]
if.app-id = 'com.apple.Maps'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Maps"']

[[on-window-detected]]
if.app-id = 'com.todoist.mac.Todoist'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.PhotoBooth'
run = ['layout floating', 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/center-window.sh "Photo Booth"']

[[on-window-detected]]
if.app-id = 'com.apple.Photos'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = ['layout floating']
