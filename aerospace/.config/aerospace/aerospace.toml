# AeroSpace config - Hyprland-style keybinds (CTRL modifier)

config-version = 2

start-at-login = true

after-startup-command = [
  'exec-and-forget sleep 3 && open -a Spotify',
  'exec-and-forget sleep 3 && open -a Discord',
  'exec-and-forget sleep 3 && open -a Slack',
  'exec-and-forget sleep 3 && open -a "Zen Browser"',
  'exec-and-forget sleep 3 && open -a OpenWhispr',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

[key-mapping]
preset = 'qwerty'

[mode.main.binding]

# Window navigation (wraps across monitors)
ctrl-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'

ctrl-left = 'focus left --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-down = 'focus down --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-up = 'focus up --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'
ctrl-right = 'focus right --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors'

# Move windows (wraps across monitors)
ctrl-shift-left = 'move left --boundaries all-monitors-outer-frame'
ctrl-shift-down = 'move down --boundaries all-monitors-outer-frame'
ctrl-shift-up = 'move up --boundaries all-monitors-outer-frame'
ctrl-shift-right = 'move right --boundaries all-monitors-outer-frame'

# Workspaces (numbered)
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'
ctrl-6 = 'workspace 6'
ctrl-7 = 'workspace 7'
ctrl-8 = 'workspace 8'
ctrl-9 = 'workspace 9'
ctrl-0 = 'workspace 10'

# Move window to workspace
ctrl-shift-1 = 'move-node-to-workspace 1'
ctrl-shift-2 = 'move-node-to-workspace 2'
ctrl-shift-3 = 'move-node-to-workspace 3'
ctrl-shift-4 = 'move-node-to-workspace 4'
ctrl-shift-5 = 'move-node-to-workspace 5'
ctrl-shift-6 = 'move-node-to-workspace 6'
ctrl-shift-7 = 'move-node-to-workspace 7'
ctrl-shift-8 = 'move-node-to-workspace 8'
ctrl-shift-9 = 'move-node-to-workspace 9'
ctrl-shift-0 = 'move-node-to-workspace 10'

# Workspace navigation (tab)
ctrl-backtick = 'workspace-back-and-forth'
ctrl-shift-backtick = 'move-workspace-to-monitor --wrap-around next'

# Layout
ctrl-slash = 'layout tiles horizontal vertical'
ctrl-comma = 'layout accordion horizontal vertical'
ctrl-e = 'layout tiling floating'

# Resize
ctrl-minus = 'resize smart -50'
ctrl-equal = 'resize smart +50'

# Window actions
ctrl-shift-w = 'close --quit-if-last-window'
ctrl-shift-f = 'fullscreen'

# Terminal (tmux session picker)
ctrl-enter = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/tmux-session-picker.sh'

# App Launchers -> toggle workspaces
ctrl-shift-b = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh B'
ctrl-shift-g = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh G'
ctrl-shift-m = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh M'
ctrl-shift-o = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh O'
ctrl-shift-a = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh A'
ctrl-shift-y = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh Y'
ctrl-shift-c = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh C'
ctrl-shift-x = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh X'
ctrl-shift-l = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh L'
ctrl-shift-t = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh T'
ctrl-shift-r = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh R'
ctrl-shift-s = 'exec-and-forget /Users/paulmv/dotfiles/aerospace/scripts/toggle-workspace.sh S'

# Service mode
ctrl-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
ctrl-shift-h = ['join-with left', 'mode main']
ctrl-shift-j = ['join-with down', 'mode main']
ctrl-shift-k = ['join-with up', 'mode main']
ctrl-shift-l = ['join-with right', 'mode main']

# App -> Workspace rules (native apps)
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['workspace S']

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['workspace O', 'layout tiling']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
if.workspace = 'M'
run = ['layout accordion']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['workspace M']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
if.workspace = 'M'
run = ['layout accordion']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['workspace M']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'x.com'
run = ['workspace X']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['layout tiling']

[[on-window-detected]]
if.app-id = 'com.zen-browser.zen'
run = ['workspace B', 'layout tiling']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
if.workspace = 'A'
run = ['layout accordion']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['workspace A']

[[on-window-detected]]
if.app-id = 'ai.opencode.desktop'
if.workspace = 'A'
run = ['layout accordion']

[[on-window-detected]]
if.app-id = 'ai.opencode.desktop'
run = ['workspace A']

[[on-window-detected]]
if.app-id = 'com.herotools.openwispr'
if.workspace = 'A'
run = ['layout accordion']

[[on-window-detected]]
if.app-id = 'com.herotools.openwispr'
run = ['workspace A']
