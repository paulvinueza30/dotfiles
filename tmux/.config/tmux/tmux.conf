# Prefix
set -g prefix C-Space
set -g prefix2 C-a
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind x kill-pane

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

bind -n C-M-S-h resize-pane -L 5
bind -n C-M-S-j resize-pane -D 5
bind -n C-M-S-k resize-pane -U 5
bind -n C-M-S-l resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

bind -r Tab last-window
bind -n M-Tab select-window -t +1
bind -n M-BTab select-window -t -1

# Toggle pane layout
bind-key \\ next-layout

# Common pane layouts
bind 1 select-layout even-horizontal
bind 2 select-layout even-vertical
bind 3 select-layout main-horizontal
bind 4 select-layout main-vertical
bind 5 select-layout tiled

# Pane Popups
bind g display-popup -d "#{pane_current_path}" -w 98% -h 95% -E "lazygit"
bind D display-popup -d "#{pane_current_path}" -w 98% -h 95% -E "lazydocker"
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind T display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "/Users/paulmv/.config/tmux/scripts/go-test-picker.sh"
bind ? display-popup -w 90% -h 95% -E "/Users/paulmv/.local/bin/leaf ~/.config/tmux/keybindings.md"
bind ` display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'nvim ~/.config/tmux/tmux.conf'
bind m display-popup -d "#{pane_current_path}" -w 98% -h 95% -E "/Users/paulmv/.local/bin/leaf"
bind F choose-window -F "#{window_name}"
bind f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E 'file=$(fzf --reverse --height 100%) && nvim "$file"'

# Window Popups
bind o new-window -d -n opencode -c "#{pane_current_path}" opencode

# Session Launchers
bind -n M-g run-shell "/Users/paulmv/.config/tmux/scripts/session-launch.sh ghdash gh dash"
bind -n M-d run-shell "/Users/paulmv/.config/tmux/scripts/session-launch.sh discord discordo -config-path /Users/paulmv/dotfiles/discordo/.config/discordo/config.toml"
bind -n M-D run-shell "/Users/paulmv/.config/tmux/scripts/session-launch.sh lazydocker lazydocker"
bind -n M-o run-shell "/Users/paulmv/.config/tmux/scripts/session-launch.sh opencode opencode"

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-` switch-client -l

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 100
set -g window-status-separator ""
set -g status-justify centre
set -gw automatic-rename on
# set -gw automatic-rename-format '#{b:pane_current_path}'

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_max_name_len "15"
set -g @tmux_window_name_use_tilde "True"
set -g @tmux_window_name_icon_style "'name_and_icon'"
set -g @tmux_window_name_custom_icons '{"opencode": "\\uf489", "lazygit": "\\ue725", "htop": "\\uf0e7", "btop": "\\uf0e7", "man": "\\uf02d", "less": "\\uf02d", "ssh": "\\uf233", "make": "\\uf0ad", "cmake": "\\uf0ad", "sudo": "\\uf21b", "top": "\\uf0e7", "default": "\\uf410"}'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'feqzz/tmux-mpv-info'
set -g @plugin 'sjdonado/tmux-workspace-usage'
set -g @plugin 'richin13/tmux-plugin-playerctl'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Playerctl settings
set -g @short_length "100"
set -g @playerctl_visible 1

# Workspace usage settings
set -g @workspace_usage_processes "tmux|nvim|ghostty|opencode"
set -g @workspace_usage_mem "on"
set -g @workspace_usage_cpu "off"
set -g @workspace_visible 1

# Toggle playerctl visibility
bind y run-shell "val=\$(tmux show -gv @playerctl_visible); if [ \"\$val\" = \"1\" ]; then tmux set -g @playerctl_visible 0; else tmux set -g @playerctl_visible 1; fi; tmux refresh-client -S"

# Toggle workspace usage visibility
bind u run-shell "val=\$(tmux show -gv @workspace_visible); if [ \"\$val\" = \"1\" ]; then tmux set -g @workspace_visible 0; else tmux set -g @workspace_visible 1; fi; tmux refresh-client -S"

# Catppuccin config
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags none
set -g @catppuccin_status_background default

# Let TPM load catppuccin when the plugin is installed.
# The previous source-file path pointed at a file that doesn't exist.
set -g @catppuccin_flavor 'mocha'

# Status bar content
set -g status-style bg=default
set -g status-left "#[fg=#a6e3a1,bold] #S#{?window_zoomed_flag, 󱉶,} #{?@playerctl_visible,#[dim]#[fg=#fab388]#{playerctl_short}#[dim],} "
set -g status-right "#{?client_prefix,#[fg=#f38ba8 bold] PREFIX ,}#[fg=#f9e2af]#{pomodoro_status} #(/usr/local/bin/gitmux -cfg $HOME/.config/tmux/gitmux.conf \"#{pane_current_path}\")  #{?@workspace_visible,#{workspace_usage},}"

run '~/.tmux/plugins/tpm/tpm'

# Force transparent background after TPM (catppuccin overrides it)
set -g status-style bg=default

# Window formats — override after TPM (catppuccin mocha colors per index)
set -g window-status-format "#[fg=#{?#{==:#I,1},#f5e0dc,#{?#{==:#I,2},#cba6f7,#{?#{==:#I,3},#f5c2e7,#{?#{==:#I,4},#89b4fa,#{?#{==:#I,5},#f38ba8,#{?#{==:#I,6},#fab387,#{?#{==:#I,7},#f9e2af,#{?#{==:#I,8},#a6e3a1,#{?#{==:#I,9},#94e2d5,#b4befe}}}}}}}}}]  #I:#W  "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#{?#{==:#I,1},#f5e0dc,#{?#{==:#I,2},#cba6f7,#{?#{==:#I,3},#f5c2e7,#{?#{==:#I,4},#89b4fa,#{?#{==:#I,5},#f38ba8,#{?#{==:#I,6},#fab387,#{?#{==:#I,7},#f9e2af,#{?#{==:#I,8},#a6e3a1,#{?#{==:#I,9},#94e2d5,#b4befe}}}}}}}}},bold]  #I:#W  #[bg=default]"
