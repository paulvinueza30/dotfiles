# ============================================
# Auto-fullscreen tmux sessions (launched via tmux-launcher with [tmux] title)
# ============================================

windowrule = fullscreen 2, match:class = ^(ghostty)$, match:title = ^\[tmux\]

# ============================================
# Workspace Rules - Force auto-group on these workspaces
# ============================================

workspace = special:Messaging, gapsin:0, gapsout:0
workspace = special:AI, gapsin:0, gapsout:0
workspace = special:forge, gapsin:0, gapsout:0

# ============================================
# Named Workspace Rules
# ============================================

# Messaging Workspace (Vesktop + Slack)
windowrule {
  name = workspace-messaging-vesktop
  workspace = special:Messaging silent
  no_initial_focus = on
  suppress_event = activate activatefocus
  match:class = (vesktop)
}

windowrule {
  name = workspace-messaging-slack
  workspace = special:Messaging silent
  no_initial_focus = on
  suppress_event = activate activatefocus
  match:class = (Slack)
}

# AI Workspace (Claude + Gemini)
windowrule {
  name = workspace-ai-claude
  workspace = special:AI silent
  no_initial_focus = on
  suppress_event = activate activatefocus
  match:class = (Claude)
}

windowrule {
  name = workspace-ai-gemini
  workspace = special:AI silent
  no_initial_focus = on
  suppress_event = activate activatefocus
  match:class = (.*gemini\.google\.com.*)
}

