# ============================================
# Named Workspace Rules
# ============================================

# Messaging Workspace (Discord + Slack)
windowrule {
  name = workspace-messaging-discord
  workspace = special:Messaging silent
  group = set
  match:initial_title = (discord.com_/channels/@me)
}

windowrule {
  name = workspace-messaging-slack
  workspace = special:Messaging silent
  group = set
  match:class = (Slack)
}

# AI Workspace (Claude + Gemini)
windowrule {
  name = workspace-ai-gemini
  workspace = special:AI silent
  group = set
  match:initial_title = (.*gemini.*)
}

windowrule {
  name = workspace-ai-claude
  workspace = special:AI silent
  group = set
  match:class = (Claude)
}

# ============================================
# Special Workspaces (Individual Apps)
# ============================================

windowrule {
  name = special-spotify
  workspace = special:Spotify silent
  match:class = (spotify)
}

windowrule {
  name = special-obsidian
  workspace = special:Obsidian silent
  match:class = (obsidian)
}

windowrule {
  name = special-deskthing
  workspace = special:DeskThing silent
  match:class = (deskthing)
}

windowrule {
  name = special-instagram
  workspace = special:Instagram silent
  match:initial_title = (.*instagram.*)
}

