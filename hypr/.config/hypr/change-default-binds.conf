bind = , F3 , exec , omarchy-cmd-screenshot
bind = CTRL , F3, exec, omarchy-cmd-screenrecord
bindn = , mouse:274, exec, wl-copy -pc
bindd = SUPER, apostrophe, Toggle Dictation, exec, voxtype record toggle

# Swap TAB workspace navigation (former workspace becomes TAB, next becomes CTRL+TAB)
unbind = SUPER, TAB
unbind = SUPER CTRL, TAB
bindd = SUPER, TAB, Former workspace, workspace, previous
bindd = SUPER CTRL, TAB, Next workspace, workspace, e+1

# Remove annoying ALT+TAB group navigation
unbind = SUPER ALT, TAB
unbind = SUPER SHIFT ALT, TAB

# Free ALT+TAB for tmux window cycling
unbind = ALT, TAB
unbind = ALT SHIFT, TAB

# Better group navigation with bracket keys
bindd = SUPER, bracketleft, Previous window in group, changegroupactive, b
bindd = SUPER, bracketright, Next window in group, changegroupactive, f

# Forge binding - back to standard toggle
unbind = SUPER, S
bind = SUPER, S, togglespecialworkspace, forge
