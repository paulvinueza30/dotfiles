# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, ~/.config/hypr/tmux-session-picker.sh
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
# bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
# bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, minus, Monitor, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, equal, Docker, exec, omarchy-launch-tui lazydocker
# bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
# bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://gemini.google.com/app"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bind = SUPER SHIFT, C, exec, ~/.config/hypr/toggle-forge.sh Calendar
bindd = SUPER SHIFT ALT, D, ExcaliDraw, exec, omarchy-launch-webapp "https://excalidraw.com"
# bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
# bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
# bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# toggle special workspaces

# Forge binding moved to change-default-binds.conf

# Closes whatever scratchpad you had open
bind = SUPER SHIFT, grave, togglespecialworkspace, __TEMP
bind = SUPER SHIFT, grave, togglespecialworkspace, __TEMP

bind = SUPER SHIFT, T, exec, ~/.config/hypr/toggle-forge.sh Todoist
bind = SUPER SHIFT, I, exec, ~/.config/hypr/toggle-forge.sh Instagram
bind = SUPER SHIFT, X, exec, ~/.config/hypr/toggle-forge.sh X
bind = SUPER SHIFT, L, exec, ~/.config/hypr/toggle-forge.sh LinkedIn
bind = SUPER SHIFT, Y, exec, ~/.config/hypr/toggle-forge.sh YouTube
bind = SUPER SHIFT, G, exec, ~/.config/hypr/toggle-forge.sh GitHub

bind = SUPER SHIFT, E, exec, ~/.config/hypr/toggle-forge.sh Gmail
bind = SUPER SHIFT, S, exec, ~/.config/hypr/toggle-forge.sh Spotify
bind = SUPER SHIFT, M, exec, ~/.config/hypr/toggle-forge.sh Messaging
bind = SUPER SHIFT, O, exec, ~/.config/hypr/toggle-forge.sh Obsidian
bind = SUPER SHIFT, Z, exec, ~/.config/hypr/toggle-forge.sh NeetCode
bind = SUPER SHIFT, A, exec, ~/.config/hypr/toggle-forge.sh AI
bind = SUPER SHIFT, R, exec, ~/.config/hypr/toggle-forge.sh Reddit
bind = SUPER SHIFT, P, exec, ~/.config/hypr/toggle-forge.sh ProxMox
bind = SUPER SHIFT, N, exec, ~/.config/hypr/toggle-forge.sh N8N

# Additional webapp launchers
bindd = SUPER SHIFT ALT, D, Discord, exec, omarchy-launch-webapp "https://discord.com/channels/@me"
bindd = SUPER SHIFT ALT, S, Slack, exec, omarchy-launch-webapp "https://app.slack.com/client/"
bindd = SUPER SHIFT ALT, I, Instagram, exec, omarchy-launch-webapp "https://www.instagram.com/"

# DeskThing moved to semicolon
bind = SUPER SHIFT, semicolon, togglespecialworkspace, DeskThing

# Close special workspace when switching to regular workspaces
bind = SUPER, 1, exec, ~/.config/hypr/toggle-forge.sh 1
bind = SUPER, 2, exec, ~/.config/hypr/toggle-forge.sh 2
bind = SUPER, 3, exec, ~/.config/hypr/toggle-forge.sh 3
bind = SUPER, 4, exec, ~/.config/hypr/toggle-forge.sh 4
bind = SUPER, 5, exec, ~/.config/hypr/toggle-forge.sh 5
bind = SUPER, 6, exec, ~/.config/hypr/toggle-forge.sh 6
bind = SUPER, 7, exec, ~/.config/hypr/toggle-forge.sh 7
bind = SUPER, 8, exec, ~/.config/hypr/toggle-forge.sh 8
bind = SUPER, 9, exec, ~/.config/hypr/toggle-forge.sh 9
bind = SUPER, 0, exec, ~/.config/hypr/toggle-forge.sh 10
 
# Window movement with arrow keys
bind = SUPER ALT, left, movewindow, l
bind = SUPER ALT, right, movewindow, r
bind = SUPER ALT, up, movewindow, u
bind = SUPER ALT, down, movewindow, d
