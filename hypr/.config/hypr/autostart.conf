# Native apps - Slack and Claude create locked groups
exec-once = [workspace special:Messaging silent; group set lock] uwsm app -- slack
exec-once = [workspace special:AI silent; group set lock] claude
exec-once = [workspace special:Obsidian silent] uwsm app -- obsidian -disable-gpu --enable-wayland-ime
exec-once = [workspace special:Spotify silent] spotify
exec-once = [workspace special:DeskThing silent] deskthing
exec-once = [workspace special:forge silent] ghostty -e tmux new-session -A -s forge

# Forge workspace fullscreen
exec-once = workspace = special:forge, fullscreen

# Webapps - Discord and Gemini invade the locked groups
exec-once = ~/.config/hypr/startup-webapps.sh

exec-once = hyprctl setcursor Bibata-Modern-Class 24
